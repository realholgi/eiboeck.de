baseURL: "https://eiboeck.de/"
languageCode: "DE-de"
defaultContentLanguage: "de"
title: "Holger Eiboeck EDV Dienstleistungen"
theme: hugo-profile

disableKinds:
 - taxonomy
 - term

outputs:
  home:
    - "HTML"
  page:
    - "HTML"

enableRobotsTXT: true
enableGitInfo: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: home
      name: Home
      title: Verlässlicher IT-Service
      url: /
      weight: 1

    - identifier: konzept
      name: Konzept
      title: Konzept und Arbeitsweise
      url: /konzept
      weight: 2

    - identifier: leistung
      name: Leistungen
      title: Leistungen
      url: /leistung
      weight: 3

    - identifier: preis
      name: Preise
      title: Preise
      url: /preis
      weight: 4

    - identifier: ueber
      name: Über mich
      title: Über mich
      url: /ueber
      weight: 5

    - identifier: support
      name: Support
      title: Fernwartung mit TeamViewer QuickSupport
      url: /support
      weight: 6

    - identifier: kontakt
      name: Kontakt
      title: Sie möchten ein Projekt besprechen oder Unterstützung für Ihre IT?
      url: /kontakt
      weight: 7

  footer:
    - identifier: impressum
      name: Impressum
      url: /impressum
      weight: 1
    - identifier: datenschutz
      name: Datenschutz
      url: /datenschutzerklaerung
      weight: 2

params:
  title: "Holger Eiboeck EDV Dienstleistungen"
  description: "Verlässlicher IT-Service aus Karlsruhe"
  staticPath: "https://eiboeck.de"  # The path to serve the static files from
  favicon: "/favicon.ico"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    disableThemeToggle: true
    defaultTheme: "light" # light

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left
    family: "Arial, 'Helvetica Neue', Helvetica, sans-serif"

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    textColor: "#343a40"
    secondaryTextColor: "#6c757d"
    textLinkColor: "#307ecc"
    backgroundColor: "#ffffff"
    secondaryBackgroundColor: "#64ffda1a"
    primaryColor: "#307ecc"
    secondaryColor: "#f8f9fa"

    darkmode:
      textColor: "#e4e6eb"
      secondaryTextColor: "#b0b3b8"
      textLinkColor: "#ffffff"
      backgroundColor: "#18191a"
      secondaryBackgroundColor: "#212529"
      primaryColor: "#ffffff"
      secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    brandLogo: "/img/eedv_logo.png" # Logo for the brand | default is the favicon variable
    showBrandLogo: true # Show brand logo in nav bar | default is true
    brandName: "Holger Eiboeck EDV Dienstleistungen" # Brand name for the brand | default is the title variable
    disableSearch: true
    searchPlaceholder: "Suchen"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: true
      disableExperience: true
      disableEducation: true
      disableProjects: true
      disableAchievements: true
      disableContact: true

  # Hero
  hero:
    enable: true
    intro: "Holger Eiboeck"
    title: "IT-Service aus Karlsruhe"
    #subtitle: "Ich bin IT-Spezialist, erfahrener Programmierer und Apple-Profi aus Leidenschaft."
    content: "Ich unterstütze Unternehmen und Selbstständige bei Support, Infrastruktur und individueller Softwareentwicklung."
    image: /img/holgi_avatar2023.png
    bottomImage:
      enable: false
    roundImage: true
    button:
      enable: true
      name: "Über mich"
      url: "ueber"
      download: false
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/realholgi
        - icon: fab fa-mastodon
          url: https://23.social/@realholgi

  # About
  about:
    enable: true
    title: "IT-Know-how"
    content: |-
      Ich unterstütze Unternehmen und Selbstständige bei Support, Infrastruktur und individueller Softwareentwicklung. Die passende Lösung zählt mehr als die größte: technisch sauber, wirtschaftlich vernünftig und im Alltag verlässlich.

  # Achievements
  achievements:
    enable: true
    title: "Erfahrung"
    items:
      - title: IT-Beratung und Support
        content: Betreuung von IT, Telekommunikation und Netzwerken für kleinere und mittelständische Unternehmen
        image: /img/eedv_logo.png
      - title: Erfahrener Programmierer
        content: "Guter Code ist der Anfang. [Software-Engineering](https://de.wikipedia.org/wiki/Softwaretechnik) sorgt dafür, dass er wartbar bleibt."
        image: /img/eedv_logo.png
      - title: Apple Profi
        content: Langjährige Erfahrung mit Apple-Geräten, macOS, iOS und deren Integration in bestehende IT-Umgebungen
        image: /img/eedv_logo.png

  # Contact
  contact:
    enable: true
    title: "Kontakt"
    content: Sie möchten ein Projekt besprechen oder brauchen Unterstützung bei Ihrer IT? Ich freue mich auf Ihre Nachricht.
    btnName: Kontakt aufnehmen
    btnLink: kontakt

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/realholgi
      mastodon: https://23.social/@realholgi
      email: kontakt

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: false
    readTime:
      enable: false
      content: "Min. Lesezeit"
    scrollprogress:
      enable: false
    tags:
      openInNewTab: true

  # For translations
  terms:
    read: "Weiterlesen"
    toc: "Inhalt"
    copyright: "Holger Eiboeck"
    pageNotFound: "Seite nicht gefunden"
    emailText: "Schauen Sie sich diese Website an"


    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"
